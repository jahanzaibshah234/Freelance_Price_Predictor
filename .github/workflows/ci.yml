name: FastAPI CI/CD Pipeline

# Trigger the workflow on pushes and pull requests to the main branch
on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    test:
        name: Run Pytest Suite
        runs-on: ubuntu-latest
        environment: Production

        steps:
        # 1. Grab the code from your GitHub repository
        - name: Checkout repository
          uses: actions/checkout@v4

        # 2. Set up Python (Matching the version you used locally)
        - name: Set up Python 3.10
          uses: actions/setup-python@v5
          with:
            python-version: "3.10"
            cache: 'pip' # Speeds up future runs by caching dependencies

        # 3. Install all the packages from your requirements.txt
        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r freelance_price_predictor/requirements.txt

        # 4. Run the automated test suite
        - name: Run tests with Pytest
          run: |
            # This will run your 5 tests and fail the build if any fail
            cd freelance_price_predictor
            pytest test.py -v
